@let chatModel = viewModel();
<div class="flex flex-col flex-1" #messagesContainer>
    <div class="flex-1 w-full max-w-3xl mx-auto px-4 py-6">
      <div *ngIf="chatModel.isLoading"
           class="flex justify-center items-center h-32">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-text-primary"></div>
      </div>
      <div *ngFor="let messageModel of messages(); let last = last; trackBy: trackByMessageId"
           class="mb-6">
        <div *ngIf="chatModel.error && last"
             class="p-4 mb-4">
          <div class="flex items-center">
            <svg class="w-5 h-5 text-red-600 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                    clip-rule="evenodd"/>
            </svg>
            <span class="text-red-800">{{ chatModel.error }}</span>
            <button class="ml-auto text-red-600 hover:text-red-800 underline text-sm cursor-pointer">
              Retry
            </button>
          </div>
        </div>
        <div *ngIf="messageModel.content.type === 'ATTACHMENT'" class="flex justify-end mb-2">
          <div class="max-w-xs lg:max-w-md xl:max-w-lg min-w-0">
            <app-attachment-card
              [filename]="$any(messageModel.content).filename"
              [mimeType]="$any(messageModel.content).mimeType"
              [fileSize]="$any(messageModel.content).fileSize"
              [clickable]="true"
              [attachmentId]="$any(messageModel.content).attachmentId"
              (cardClicked)="onAttachmentCardClicked($any(messageModel.content).attachmentId, $any(messageModel.content).filename, $any(messageModel.content).mimeType)"
            />
          </div>
        </div>
        <div *ngIf="messageModel.role === Role.ANONYMOUS && messageModel.content.type !== 'ATTACHMENT'" class="flex justify-end mb-4">
          <div class="max-w-xs lg:max-w-md xl:max-w-lg min-w-0">
            <div class="bg-surface-tertiary text-text-primary rounded-3xl px-4 py-2 overflow-hidden">
              <div
                markdown
                class="markdown-content prose max-w-none"
                [data]="(messageModel.content | asReplyChunk).text">
              </div>
            </div>
          </div>
        </div>
        <div *ngIf="messageModel.role === Role.ASSISTANT" class="flex justify-start mb-4">
          <div class="max-w-xs lg:max-w-md xl:max-w-2xl min-w-0">
            <div class="rounded-lg py-2 overflow-hidden">
              <ng-container [ngSwitch]="messageModel.content.type">
                <!-- REPLY_CHUNK -->
                <ng-container *ngSwitchCase="'REPLY_CHUNK'">
                  <div markdown class="markdown-content prose max-w-none"
                       [data]="(messageModel.content | asReplyChunk).text">
                  </div>
                </ng-container>
                <!-- ERROR -->
                <ng-container *ngSwitchCase="'REPLY_ERROR'">
                  <div class="bg-red-100 border border-red-300 text-red-700 p-2 rounded-md">
                    {{ (messageModel.content | asReplyError).reason }}
                  </div>
                </ng-container>
                <!-- Fallback -->
                <ng-container *ngSwitchDefault>
                  <div class="text-text-tertiary">
                    Oops! Something went wrong, please try again later.
                  </div>
                </ng-container>
              </ng-container>
            </div>
            <!-- Action buttons -->
            <div class="flex items-center gap-0.5">
              <!-- Copy -->
              <button class="p-2 rounded-lg flex items-center justify-center text-text-secondary hover:text-text-primary hover:bg-surface-hover cursor-pointer" aria-label="Copy text">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
              <!-- Like -->
              <button class="p-2 rounded-lg flex items-center justify-center text-text-secondary hover:text-text-primary hover:bg-surface-hover cursor-pointer" aria-label="Like">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                </svg>
              </button>
              <!-- Dislike -->
              <button class="p-2 rounded-lg flex items-center justify-center text-text-secondary hover:text-text-primary hover:bg-surface-hover cursor-pointer" aria-label="Dislike">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
                </svg>
              </button>
              <!-- Share -->
              <button class="p-2 rounded-lg flex items-center justify-center text-text-secondary hover:text-text-primary hover:bg-surface-hover cursor-pointer" aria-label="Share">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="18" cy="5" r="3"/>
                  <circle cx="6" cy="12" r="3"/>
                  <circle cx="18" cy="19" r="3"/>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Loading indicator when waiting for assistant response -->
      <div *ngIf="chatModel.isVisitorWaitingForReply || chatModel.isPromptSubmitting"
           class="flex justify-start mb-4">
        <div class="max-w-xs lg:max-w-md xl:max-w-2xl min-w-0">
          <div class="rounded-lg py-2 overflow-hidden">
            <div class="flex items-center space-x-2 px-2">
              <div class="w-1.5 h-1.5 bg-text-primary rounded-full animate-bounce [animation-delay:0ms]"></div>
              <div class="w-1.5 h-1.5 bg-text-primary rounded-full animate-bounce [animation-delay:150ms]"></div>
              <div class="w-1.5 h-1.5 bg-text-primary rounded-full animate-bounce [animation-delay:300ms]"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  <div class="sticky bottom-0 w-full bg-bg-primary">
    <div class="w-full max-w-3xl px-4 mx-auto">
      <app-prompt-input-form
        [form]="chatModel.form"
        [placeholder]="'Reply'"
        [isSubmitting]="chatModel.isPromptSubmitting"
        [isDeactivated]="chatModel.isPromptSubmitting || chatModel.isVisitorWaitingForReply || chatModel.isReplyStreaming"
        [isLineWrapped]="chatModel.isLineWrapped"
        (onPressEnter)="onAddMessage()"
        (lineWrapDetected)="handleLineWrapChange($event)"
        [attachment]="chatModel.attachment"
        (removeAttachment)="onRemoveAttachment()">
        <app-prompt-actions-menu leftActions (fileSelected)="onFileSelected($event)"/>
        <div class="flex items-center gap-1" [class.justify-end]="chatModel.isLineWrapped">
          <app-prompt-send-button
            aria-label="Send messageModel"
            (clicked)="onAddMessage()"
            [deactivated]="(chatModel.form.invalid && !chatModel.attachment?.attachmentId) || chatModel.isPromptSubmitting"
            [isSubmitting]="chatModel.isPromptSubmitting"
          />
        </div>
      </app-prompt-input-form>
      <app-chat-disclaimer/>
    </div>
  </div>
  @if (pdfPreview(); as preview) {
    <app-pdf-preview-dialog
      [filename]="preview.filename"
      [downloadUrl]="preview.downloadUrl"
      (close)="closePdfPreview()"
    />
  }
</div>
