<div class="fixed inset-0 z-50 flex items-center justify-center"
     style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">

  <div class="bg-surface-primary rounded-2xl shadow-xl p-8 w-full max-w-sm border border-border-light relative">

    <!-- Close button -->
    <button (click)="close.emit()"
            class="absolute top-4 right-4 p-1 rounded-full text-text-tertiary hover:text-text-primary hover:bg-surface-hover cursor-pointer"
            aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <h2 class="text-xl font-semibold text-text-primary text-center">Share message</h2>

    <!-- Separator -->
    <div class="h-px bg-border-light my-6"></div>

    <!-- Message preview -->
    <div class="bg-surface-secondary rounded-xl p-3 mb-6 max-h-24 overflow-hidden">
      <p class="text-sm text-text-secondary line-clamp-3">{{ messageText() }}</p>
    </div>

    <!-- Action buttons -->
    <div class="flex justify-center gap-6">
      <!-- Copy link -->
      <button (click)="onCopyLink()"
              class="flex flex-col items-center gap-2 cursor-pointer group">
        <div class="w-12 h-12 rounded-full bg-surface-secondary flex items-center justify-center group-hover:bg-surface-hover">
          <svg *ngIf="!copied()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-primary">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <svg *ngIf="copied()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-text-primary">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <span class="text-xs text-text-secondary">{{ copied() ? 'Copied!' : 'Copy link' }}</span>
      </button>
    </div>
  </div>
</div>
