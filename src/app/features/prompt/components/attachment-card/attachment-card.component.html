<div
  class="flex items-center gap-3 px-3 py-2 rounded-xl border border-border-light max-w-xs"
  [class.cursor-pointer]="clickable()"
  [class.hover:bg-surface-hover]="clickable()"
  (click)="onClick()"
>
  <!-- File icon with circular progress -->
  <div class="relative flex-shrink-0 w-10 h-10">
    @if (isUploading()) {
      <svg class="absolute inset-0 w-10 h-10 -rotate-90" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="none" stroke-width="2.5" class="stroke-border-light"/>
        <circle cx="20" cy="20" r="18" fill="none" stroke-width="2.5" class="stroke-blue-500"
                stroke-linecap="round"
                [attr.stroke-dasharray]="circumference()"
                [attr.stroke-dashoffset]="strokeOffset()"/>
      </svg>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-[10px] font-medium text-text-secondary">{{ progress() }}%</span>
      </div>
    } @else {
      @if (isPdf()) {
        <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-red-500 text-white">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
      } @else {
        <div class="w-10 h-10 flex items-center justify-center rounded-lg bg-blue-500 text-white">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
      }
    }
  </div>
  <!-- File info -->
  <div class="flex-1 min-w-0">
    <p class="text-sm font-medium text-text-primary truncate">{{ filename() }}</p>
    <p class="text-xs text-text-tertiary">{{ formatLabel() }} · {{ formattedSize() }}</p>
  </div>
  <!-- Remove button -->
  @if (removable()) {
    <button
      (click)="onRemove($event)"
      class="flex-shrink-0 p-1 rounded-full text-text-tertiary hover:text-text-primary hover:bg-surface-hover cursor-pointer"
      aria-label="Remove attachment"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  }
</div>
