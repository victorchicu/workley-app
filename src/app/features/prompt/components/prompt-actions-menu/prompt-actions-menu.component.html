<div class="relative flex items-center">
  <button
    (click)="toggle()"
    class="p-1.5 ml-1 flex items-center justify-center rounded-full text-text-secondary hover:bg-surface-hover hover:text-text-primary cursor-pointer transition-transform duration-200"
    [class.rotate-45]="menuOpen()"
    aria-label="Actions menu"
  >
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  @if (menuOpen()) {
    <div class="fixed w-56 bg-surface-secondary border border-border-light rounded-xl shadow-lg z-[100] p-1.5"
         #dropdown
         role="menu">
      <!-- Upload resume -->
      <button class="flex items-center gap-3 w-full px-3 py-2 text-sm text-text-primary hover:bg-surface-hover rounded-lg cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
        Upload resume
      </button>

      <div class="my-1 mx-2 h-px bg-border-light"></div>

      <!-- Post a job -->
      <button class="flex items-center gap-3 w-full px-3 py-2 text-sm text-text-primary hover:bg-surface-hover rounded-lg cursor-pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
          <line x1="4" y1="22" x2="4" y2="15"/>
        </svg>
        Post a job
      </button>
    </div>
  }
</div>
