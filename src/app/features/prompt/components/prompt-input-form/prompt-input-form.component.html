@let input = viewModel();
@let hintsOpen = showHints() && hints().length > 0;
<div class="relative w-full mx-auto">
  @if (hintsOpen) {
    <ul #hintsList class="absolute bottom-full left-0 right-0 bg-surface-input border-[0.5px] border-border-input border-b-0 shadow-[0_-10px_15px_-3px_rgb(0_0_0_/_0.1),0_-4px_6px_-4px_rgb(0_0_0_/_0.1)] rounded-t-3xl max-h-48 overflow-y-auto z-10 overflow-x-hidden">
      @for (hint of hints(); track hint; let i = $index) {
        <li
          class="min-h-[57px] flex items-center px-5 cursor-pointer hover:bg-surface-hover text-text-primary"
          [class.bg-surface-hover]="i === hintIndex()"
          [attr.data-active]="i === hintIndex() ? 'true' : null"
          (mousedown)="selectHint(hint); $event.preventDefault()">
          <span [innerHTML]="highlightHtml(hint)"></span>
        </li>
      }
    </ul>
  }
  <form [formGroup]="input.form"
        class="relative w-full bg-surface-input border-[0.5px] border-border-input shadow-lg shadow-black/10 overflow-hidden"
        [class.opacity-50]="input.isSubmitting || input.isDeactivated"
        [class.rounded-3xl]="input.isLineWrapped || hintsOpen"
        [class.rounded-full]="!input.isLineWrapped && !hintsOpen"
        [class.rounded-t-none]="hintsOpen"
        [class.border-t-0]="hintsOpen"
        [class.pointer-events-none]="input.isSubmitting || input.isDeactivated"
  >
    <fieldset [disabled]="input.isSubmitting || input.isDeactivated">
      @if (viewModel().attachment; as att) {
        <div class="px-3 pt-3">
          <app-attachment-card
            [filename]="att.filename"
            [mimeType]="att.mimeType"
            [fileSize]="att.fileSize"
            [progress]="att.status === 'uploading' ? att.progress : null"
            [removable]="true"
            (remove)="removeAttachment.emit()"
          />
        </div>
      }
      <div class="w-full flex flex-wrap p-2 bg-surface-input" [class.items-center]="!input.isLineWrapped">
        <!-- Textarea row -->
        <div class="flex items-center min-w-0 order-1" [class]="input.isLineWrapped ? 'w-full px-1 pt-1 pb-2' : 'flex-1'">
          <textarea
            #promptRef
            id="messageModel"
            rows="2"
            style="field-sizing: content; word-break: break-all !important; overflow-wrap: anywhere !important;"
            class="w-full min-w-0 text-text-primary bg-transparent focus:outline-none placeholder-text-tertiary resize-none overflow-y-auto pl-1 pr-2 break-all whitespace-pre-wrap scroll-smooth custom-scrollbar"
            autocomplete="off"
            formControlName="text"
            [placeholder]="input.placeholder"
            (input)="handleLineWrapChange()"
            (keydown)="handlePressEnter($event)"></textarea>
        </div>
        <!-- Left actions (+ button) -->
        <div class="flex items-center" [class]="input.isLineWrapped ? 'order-2' : 'order-first'">
          <ng-content select="[leftActions]"/>
        </div>
        <!-- Right actions (send button) -->
        <div class="flex items-center order-3" [class.ml-auto]="input.isLineWrapped">
          <div id="action-buttons" class="flex items-center gap-1">
            <ng-content/>
          </div>
        </div>
      </div>
    </fieldset>
  </form>
</div>
