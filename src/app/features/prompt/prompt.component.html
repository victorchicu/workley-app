@let prompt = viewModel();
<div class="min-h-screen flex flex-col items-center justify-center -mt-24">
  <div class="w-full max-w-3xl px-4">
    <div class="relative">
      <app-prompt-headline/>
      <app-prompt-input-form
        [form]="prompt.form"
        [placeholder]="'Describe it. We’ll match it.'"
        [isSubmitting]="prompt.isSubmitting"
        [isDeactivated]="prompt.isSubmitting"
        [isLineWrapped]="prompt.isLineWrapped"
        (onPressEnter)="sendPrompt()"
        (lineWrapDetected)="handleLineWrapChange($event)"
        [attachment]="prompt.attachment"
        (removeAttachment)="onRemoveAttachment()"
      >
        <app-prompt-actions-menu leftActions (fileSelected)="onFileSelected($event)"/>
        <app-prompt-send-button
          aria-label="Send prompt"
          (clicked)="sendPrompt()"
          [deactivated]="prompt.form.invalid && !hasAttachment()"
          [isSubmitting]="prompt.isSubmitting"
        />
      </app-prompt-input-form>
    </div>
  </div>
  <p class="fixed bottom-4 left-0 right-0 text-center text-xs text-[#888]">
    By messaging Workley, you agree to our
    <a routerLink="/terms-of-use" class="text-[#888] underline hover:opacity-80">Terms</a> and
    <a routerLink="/privacy-policy" class="text-[#888] underline hover:opacity-80">Privacy Policy</a>.
  </p>
</div>
