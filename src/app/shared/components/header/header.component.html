<header>
  <nav class="w-full px-4 py-2 flex items-center overflow-visible">
    <div class="flex items-center gap-1">
      <div class="p-2 opacity-90">
        <div class="w-6 h-6 bg-text-primary icon-mask" style="-webkit-mask-image: url('logo.svg'); mask-image: url('logo.svg');">
        </div>
      </div>

      <button
        (click)="newChat()"
        class="p-2 rounded-lg text-text-primary hover:bg-surface-hover cursor-pointer"
        aria-label="New chat"
      >
        <div class="w-5 h-5 bg-current icon-mask"
             style="-webkit-mask-image: url('new-chat.svg'); mask-image: url('new-chat.svg');"></div>
      </button>

      <button
        class="p-2 rounded-lg text-text-primary hover:bg-surface-hover cursor-pointer"
        aria-label="New chat"
      >
        <div class="w-5 h-5 bg-current icon-mask"
             style="-webkit-mask-image: url('chats.svg'); mask-image: url('chats.svg');"></div>
      </button>
    </div>

    <div class="flex-1"></div>

    <!-- Right: Settings + Auth/Avatar -->
    <div class="flex items-center gap-2">
      <!-- Settings dropdown -->
      <div class="relative">
        <button
          (click)="toggleDropdown()"
          class="p-2 rounded-full text-text-primary hover:bg-surface-hover cursor-pointer"
          aria-label="Theme settings"
        >
          <div class="w-5 h-5 bg-current icon-mask"
               style="-webkit-mask-image: url('setting.svg'); mask-image: url('setting.svg');"></div>
        </button>

        @if (dropdownOpen()) {
          <div
            class="absolute right-0 mt-2 p-1.5 bg-surface-secondary border border-border-light rounded-xl shadow-lg z-50"
            role="menu">
            <div class="flex items-center gap-1">
              <!-- Light -->
              <button
                (click)="selectTheme('light')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'light' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'light'"
                aria-label="Light theme"
              >
                <!-- Sun SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/>
                  <line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/>
                  <line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
              </button>

              <!-- Dark -->
              <button
                (click)="selectTheme('dark')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'dark' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'dark'"
                aria-label="Dark theme"
              >
                <!-- Moon SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </button>

              <!-- System -->
              <button
                (click)="selectTheme('system')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'system' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'system'"
                aria-label="System theme"
              >
                <!-- Monitor SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </button>
            </div>
          </div>
        }
      </div>

      @if (authService.isAuthenticated()) {
        <app-user-avatar/>
      } @else {
        <!-- Sign In -->
        <button (click)="openAuthModal()"
                class="px-4 py-2 text-sm font-medium text-text-primary border border-border-medium hover:bg-surface-hover rounded-full cursor-pointer">
          Log in
        </button>

        <!-- Sign Up -->
        <button (click)="openAuthModal()"
                class="px-4 py-2 text-sm font-medium bg-text-primary text-bg-primary rounded-full hover:opacity-90 cursor-pointer">
          Sign up
        </button>
      }
    </div>
  </nav>
</header>

@if (authModalOpen()) {
  <app-auth-modal (close)="closeAuthModal()"/>
}
