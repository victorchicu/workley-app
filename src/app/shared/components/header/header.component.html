<header>
  <nav class="w-full px-4 py-2 flex items-center overflow-visible">
    <!-- Left: Logo + New Chat -->
    <div class="flex items-center gap-1">
      <div class="p-2 opacity-90">
        <div class="w-6 h-6 bg-text-primary icon-mask"
             style="-webkit-mask-image: url('radar.svg'); mask-image: url('radar.svg');"></div>
      </div>

      <button
        (click)="newChat()"
        class="p-2 rounded-lg text-text-secondary"
        [ngClass]="isInChat() ? 'hover:text-text-primary hover:bg-surface-hover cursor-pointer' : 'opacity-30 cursor-default'"
        aria-label="New chat"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 3C7.85113 3 4 5.73396 4 10C4 11.5704 4.38842 12.7289 5.08252 13.6554C5.79003 14.5998 6.87746 15.3863 8.41627 16.0908L9.2326 16.4645L8.94868 17.3162C8.54129 18.5384 7.84997 19.6611 7.15156 20.5844C9.56467 19.8263 12.7167 18.6537 14.9453 17.1679C17.1551 15.6948 18.3969 14.5353 19.0991 13.455C19.7758 12.4139 20 11.371 20 10C20 5.73396 16.1489 3 12 3ZM2 10C2 4.26604 7.14887 1 12 1C16.8511 1 22 4.26604 22 10C22 11.629 21.7242 13.0861 20.7759 14.545C19.8531 15.9647 18.3449 17.3052 16.0547 18.8321C13.0781 20.8164 8.76589 22.2232 6.29772 22.9281C5.48665 23.1597 4.84055 22.6838 4.56243 22.1881C4.28848 21.6998 4.22087 20.9454 4.74413 20.3614C5.44439 19.5798 6.21203 18.5732 6.72616 17.4871C5.40034 16.7841 4.29326 15.9376 3.48189 14.8545C2.48785 13.5277 2 11.9296 2 10Z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="flex-1"></div>

    <!-- Right: Settings + Auth/Avatar -->
    <div class="flex items-center gap-2">
      <!-- Settings dropdown -->
      <div class="relative">
        <button
          (click)="toggleDropdown()"
          class="p-2 rounded-full text-text-secondary hover:text-text-primary hover:bg-surface-hover cursor-pointer"
          aria-label="Theme settings"
        >
          <!-- Gear SVG -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

        @if (dropdownOpen()) {
          <div class="absolute right-0 mt-2 p-1.5 bg-surface-secondary border border-border-light rounded-xl shadow-lg z-50"
               role="menu">
            <div class="flex items-center gap-1">
              <!-- Light -->
              <button
                (click)="selectTheme('light')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'light' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'light'"
                aria-label="Light theme"
              >
                <!-- Sun SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/>
                  <line x1="12" y1="1" x2="12" y2="3"/>
                  <line x1="12" y1="21" x2="12" y2="23"/>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                  <line x1="1" y1="12" x2="3" y2="12"/>
                  <line x1="21" y1="12" x2="23" y2="12"/>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
              </button>

              <!-- Dark -->
              <button
                (click)="selectTheme('dark')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'dark' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'dark'"
                aria-label="Dark theme"
              >
                <!-- Moon SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </button>

              <!-- System -->
              <button
                (click)="selectTheme('system')"
                class="p-2 rounded-lg cursor-pointer"
                [ngClass]="themeService.theme() === 'system' ? 'bg-surface-tertiary text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-surface-hover'"
                [attr.aria-pressed]="themeService.theme() === 'system'"
                aria-label="System theme"
              >
                <!-- Monitor SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </button>
            </div>
          </div>
        }
      </div>

      @if (authService.isAuthenticated()) {
        <app-user-avatar/>
      } @else {
        <!-- Sign In -->
        <button (click)="openAuthModal()"
                class="px-4 py-2 text-sm font-medium text-text-primary border border-border-medium hover:bg-surface-hover rounded-full cursor-pointer">
          Sign in
        </button>

        <!-- Sign Up -->
        <button (click)="openAuthModal()"
                class="px-4 py-2 text-sm font-medium bg-text-primary text-bg-primary rounded-full hover:opacity-90 cursor-pointer">
          Sign up
        </button>
      }
    </div>
  </nav>
</header>

@if (authModalOpen()) {
  <app-auth-modal (close)="closeAuthModal()"/>
}
