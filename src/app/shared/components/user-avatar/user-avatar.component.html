<div class="relative">
  <button (click)="toggleMenu()"
          class="w-8 h-8 rounded-full bg-text-primary text-bg-primary flex items-center justify-center text-xs font-semibold cursor-pointer hover:opacity-90">
    {{ authService.getInitials() }}
  </button>

  @if (menuOpen()) {
    <div class="absolute right-0 top-full mt-2 w-48 bg-surface-secondary border border-border-light rounded-xl shadow-lg z-50 p-1.5"
         role="menu">
      <!-- Profile -->
      <button class="flex items-center gap-3 w-full px-3 py-2 text-sm text-text-primary hover:bg-surface-hover rounded-lg cursor-pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Profile
      </button>

      <!-- Settings -->
      <button class="flex items-center gap-3 w-full px-3 py-2 text-sm text-text-primary hover:bg-surface-hover rounded-lg cursor-pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </button>

      <!-- Separator -->
      <div class="my-1 mx-2 h-px bg-border-light"></div>

      <!-- Log out -->
      <button (click)="onLogoutClick()"
              class="flex items-center gap-3 w-full px-3 py-2 text-sm text-text-primary hover:bg-surface-hover rounded-lg cursor-pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log out
      </button>
    </div>
  }
</div>

@if (logoutDialogOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center"
       (click)="cancelLogout()"
       style="background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);">
    <div (click)="$event.stopPropagation()"
         class="bg-surface-primary rounded-2xl shadow-xl p-8 w-full max-w-sm border border-border-light">

      <h2 class="text-3xl font-semibold text-text-primary mb-2 text-center">Are you sure you want to log out?</h2>
      <p class="text-sm text-text-secondary mb-6 text-center">Log out of Workley as iam.victorchicu&#64;gmail.com?</p>

      <div class="flex flex-col gap-3">
        <button (click)="confirmLogout()"
                class="w-full px-4 py-2.5 bg-text-primary text-bg-primary rounded-full text-sm font-medium hover:opacity-90 cursor-pointer">
          Log out
        </button>
        <button (click)="cancelLogout()"
                class="w-full px-4 py-2.5 bg-bg-primary text-text-primary border border-border-medium rounded-full text-sm font-medium hover:opacity-90 cursor-pointer">
          Cancel
        </button>
      </div>
    </div>
  </div>
}
